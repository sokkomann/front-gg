<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link
            rel="stylesheet"
            href="../../static/css/estimation/estimation-regist.css"
        />
    </head>
    <body>
        <button type="button" id="createPostButton" hidden aria-hidden="true">
            요청하기
        </button>
        <div
            class="composerModalOverlay"
            id="composerModalOverlay"
            hidden=""
        ></div>
        <section
            class="composerSection"
            id="composerSection"
            aria-label="게시물 작성"
            role="dialog"
            aria-modal="true"
            aria-labelledby="composerModalTitle"
            hidden=""
        >
            <!-- 작성 모달 헤더: 닫기, 제목, 임시저장처럼 작성 흐름 전체에 영향을 주는 전역 액션을 둔다. -->
            <div
                class="composerModalHeader tweet-modal__header"
                id="composerModalHeader"
            >
                <button
                    class="composerModalClose tweet-modal__close"
                    id="composerModalClose"
                    type="button"
                    aria-label="닫기"
                    data-testid="app-bar-close"
                >
                    <svg
                        viewBox="0 0 24 24"
                        width="20"
                        height="20"
                        aria-hidden="true"
                    >
                        <g>
                            <path
                                d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"
                            ></path>
                        </g>
                    </svg>
                </button>
                <h2
                    class="composerModalTitle tweet-modal__title"
                    id="composerModalTitle"
                >
                    게시하기
                </h2>
                <span class="composerModalGhost tweet-modal__draft composerRequestLabel">
                    견적요청
                </span>
            </div>
            <!-- 기본 작성 뷰: 실제 게시글 입력, 첨부, 태그, 위치, 제출이 모두 이 화면 안에서 이뤄진다. -->
            <div class="tweet-modal__compose-view" id="composerComposeView">
                <form class="composerForm" id="postComposerForm">
                    <div class="composerAvatar" id="composerAvatar">K</div>
                    <div class="composerBody tweet-modal__input-wrap">
                        <!-- 게시판/커뮤니티 선택 영역: 게시글이 어느 보드에 발행될지 정하고 hidden input과 동기화한다. -->
                            <div class="composerAudience">
                            <div class="composerAudienceRow">
                                <div class="composerProfileLink" aria-hidden="true">
                                    <div class="composerProfileLinkPerson">
                                        <img
                                            src="../../static/images/main/ad.png"
                                            alt=""
                                            class="composerProfileLinkAvatar"
                                        />
                                        <span class="composerProfileLinkEmail"
                                            >trade@gates.com</span
                                        >
                                    </div>
                                    <span class="composerProfileLinkIcon">
                                        <svg
                                            viewBox="0 0 24 24"
                                            width="56"
                                            height="56"
                                            aria-hidden="true"
                                        >
                                            <g>
                                                <path
                                                    d="M6.354 5.5H4a3 3 0 0 0 0 6h3a3 3 0 0 0 2.83-4H9q-.13 0-.25.031A2 2 0 0 1 7 10.5H4a2 2 0 1 1 0-4h1.535c.218-.376.495-.714.82-1z"
                                                ></path>
                                                <path
                                                    d="M9 5.5a3 3 0 0 0-2.83 4h1.098A2 2 0 0 1 9 6.5h3a2 2 0 1 1 0 4h-1.535a4 4 0 0 1-.82 1H12a3 3 0 1 0 0-6z"
                                                ></path>
                                            </g>
                                        </svg>
                                    </span>
                                    <div class="composerProfileLinkPerson">
                                        <img
                                            src="../../static/images/main/lown1.jpg"
                                            alt=""
                                            class="composerProfileLinkAvatar"
                                        />
                                        <span class="composerProfileLinkEmail"
                                            >partner@gates.com</span
                                        >
                                    </div>
                                </div>
                                <button
                                    class="audienceButton"
                                    id="audienceButton"
                                    type="button"
                                    aria-haspopup="dialog"
                                    aria-expanded="false"
                                >
                                    일반
                                </button>
                            </div>
                            <input
                                type="hidden"
                                id="boardType"
                                name="boardType"
                                value="general"
                            />
                            <input
                                type="hidden"
                                id="communityId"
                                name="communityId"
                                value=""
                            />
                            <div class="boardMenu" id="boardMenu" hidden="">
                                <div class="boardMenuHeader">
                                    <h3 class="boardMenuTitle" id="boardMenuTitle">
                                        게시판 선택
                                    </h3>
                                </div>
                                <div
                                    class="boardMenuOptions"
                                    id="boardMenuOptions"
                                    role="listbox"
                                    aria-labelledby="boardMenuTitle"
                                >
                                    <button
                                        class="boardMenuOption isSelected"
                                        id="boardOptionGeneral"
                                        type="button"
                                        data-board-value="general"
                                        data-board-label="일반"
                                        role="option"
                                        aria-selected="true"
                                    >
                                        <span class="boardMenuOptionInfo">
                                            <span
                                                class="boardMenuOptionIcon boardMenuOptionIcon--general"
                                                aria-hidden="true"
                                            >
                                                <svg
                                                    viewBox="0 0 24 24"
                                                    class="boardMenuOptionSvg"
                                                >
                                                    <g>
                                                        <path
                                                            d="M12 2.25c-5.376 0-9.75 4.374-9.75 9.75s4.374 9.75 9.75 9.75 9.75-4.374 9.75-9.75-4.374-9.75-9.75-9.75zm6.88 8.75h-3.126a15.848 15.848 0 00-1.038-4.018A7.786 7.786 0 0118.88 11zm-6.13-6.59c.747.855 1.676 2.718 2.184 5.59H12.75V4.41zm-1.5 0V10H9.066c.508-2.872 1.437-4.735 2.184-5.59zM5.12 13h3.126c.134 1.468.487 2.85 1.038 4.018A7.786 7.786 0 015.12 13zm3.126-2H5.12a7.786 7.786 0 014.144-4.018A15.85 15.85 0 008.246 11zm1.52 2h2.484v5.59c-.747-.855-1.676-2.718-2.184-5.59zm2.484-2H9.766c.508-2.872 1.437-4.735 2.184-5.59V11zm1.5 7.59V13h2.184c-.508 2.872-1.437 4.735-2.184 5.59zm2.484-7.59H13.75V4.41c.747.855 1.676 2.718 2.184 5.59zM14.716 17.018c.551-1.168.904-2.55 1.038-4.018h3.126a7.786 7.786 0 01-4.164 4.018z"
                                                        ></path>
                                                    </g>
                                                </svg>
                                            </span>
                                            <span class="boardMenuOptionLabel"
                                                >일반</span
                                            >
                                        </span>
                                        <span
                                            class="boardMenuOptionCheck"
                                            aria-hidden="true"
                                            >✓</span
                                        >
                                    </button>
                                    <button
                                        class="boardMenuOption"
                                        id="boardOptionProduct"
                                        type="button"
                                        data-board-value="product"
                                        data-board-label="상품"
                                        role="option"
                                        aria-selected="false"
                                    >
                                        <span class="boardMenuOptionInfo">
                                            <span
                                                class="boardMenuOptionIcon boardMenuOptionIcon--product"
                                                aria-hidden="true"
                                            >
                                                <svg
                                                    viewBox="0 0 24 24"
                                                    class="boardMenuOptionSvg"
                                                >
                                                    <g>
                                                        <path
                                                            d="M3.5 7.75l8.5-5 8.5 5v8.5l-8.5 5-8.5-5v-8.5zm8.5-3.25L6.03 8 12 11.51 17.97 8 12 4.5zm-6.5 4.79v6.12l5.5 3.24v-6.12L5.5 9.29zm7 9.36l5.5-3.24V9.29l-5.5 3.23v6.13z"
                                                        ></path>
                                                    </g>
                                                </svg>
                                            </span>
                                            <span class="boardMenuOptionLabel"
                                                >상품</span
                                            >
                                        </span>
                                        <span
                                            class="boardMenuOptionCheck"
                                            aria-hidden="true"
                                            >✓</span
                                        >
                                    </button>
                                </div>
                                <div class="boardMenuSection">
                                    <h4 class="boardMenuSectionTitle">
                                        내 커뮤니티
                                    </h4>
                                    <div
                                        class="communityMenuList"
                                        id="communityMenuList"
                                    >
                                        <button
                                            class="communityMenuItem"
                                            id="communityOptionMarket"
                                            type="button"
                                            data-community-id="market-talk"
                                            data-community-label="무역 토크"
                                        >
                                            <img
                                                src="../../static/images/main/ad.png"
                                                alt="무역 토크"
                                                class="communityMenuAvatar"
                                            />
                                            <span class="communityMenuText">
                                                <span class="communityMenuName"
                                                    >무역 토크</span
                                                >
                                                <span class="communityMenuMeta"
                                                    >1.2만 멤버</span
                                                >
                                            </span>
                                            <span
                                                class="communityMenuCheck"
                                                aria-hidden="true"
                                                >✓</span
                                            >
                                        </button>
                                        <button
                                            class="communityMenuItem"
                                            id="communityOptionProduct"
                                            type="button"
                                            data-community-id="product-lab"
                                            data-community-label="상품 연구소"
                                        >
                                            <img
                                                src="../../static/images/main/ad.png"
                                                alt="상품 연구소"
                                                class="communityMenuAvatar"
                                            />
                                            <span class="communityMenuText">
                                                <span class="communityMenuName"
                                                    >상품 연구소</span
                                                >
                                                <span class="communityMenuMeta"
                                                    >8.7천 멤버</span
                                                >
                                            </span>
                                            <span
                                                class="communityMenuCheck"
                                                aria-hidden="true"
                                                >✓</span
                                            >
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div
                            class="composerAudienceTagDock"
                            id="composerAudienceTagDock"
                        >
                            <div
                                class="tag-input"
                                id="composerTagInput"
                                hidden=""
                            ></div>
                        </div>

                        <!-- 본문 입력 영역: contenteditable 기반이라 서식, 이모지, 커서 복원 로직이 JS에서 함께 붙는다. -->
                        <div class="composerField" id="composerField">
                            <span class="hiddenText">게시물 본문</span>
                            <div
                                class="composerTextarea"
                                id="postContent"
                                contenteditable="true"
                                role="textbox"
                                aria-label="게시물 본문"
                                aria-multiline="true"
                                data-placeholder="견적을 요청해보세요."
                            ></div>
                            <input
                                type="hidden"
                                id="postContentValue"
                                name="content"
                                value=""
                            />
                        </div>

                        <!-- 첨부 미리보기 영역: 이미지/동영상/일반 파일을 올리면 동일 위치에서 즉시 결과를 확인한다. -->
                        <div
                            class="composerAttachmentPreview tweet-modal__attachment attachments"
                            id="composerAttachmentPreview"
                            data-attachment-preview=""
                            hidden=""
                        >
                            <div
                                class="composerAttachmentList tweet-modal__attachment-media media-grid-wrapper"
                                id="composerAttachmentList"
                                data-attachment-media=""
                            ></div>
                            <div
                                class="tweet-modal__attachment-meta media-actions-bar"
                            >
                                <button
                                    type="button"
                                    class="tweet-modal__attachment-meta-btn media-action-link"
                                    data-user-tag-trigger=""
                                    hidden=""
                                    disabled=""
                                    aria-label="사용자 태그하기"
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        width="18"
                                        height="18"
                                        aria-hidden="true"
                                    >
                                        <g>
                                            <path
                                                d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"
                                            ></path>
                                        </g>
                                    </svg>
                                    <span data-user-tag-label=""
                                        >사용자 태그하기</span
                                    >
                                </button>
                                <button
                                    type="button"
                                    class="tweet-modal__attachment-meta-btn media-action-link"
                                    id="composerMediaAltTrigger"
                                    data-media-alt-trigger=""
                                >
                                    <svg
                                        viewBox="0 0 24 24"
                                        width="18"
                                        height="18"
                                        aria-hidden="true"
                                    >
                                        <g>
                                            <path
                                                d="M3 4.5C3 3.12 4.12 2 5.5 2h13C19.88 2 21 3.12 21 4.5v15c0 1.38-1.12 2.5-2.5 2.5h-13C4.12 22 3 20.88 3 19.5v-15zM5.5 4c-.28 0-.5.22-.5.5v15c0 .28.22.5.5.5h13c.28 0 .5-.22.5-.5v-15c0-.28-.22-.5-.5-.5h-13zM16 10H8V8h8v2zm-8 2h8v2H8v-2z"
                                            ></path>
                                        </g>
                                    </svg>
                                    <span
                                        id="composerMediaAltLabel"
                                        data-media-alt-label=""
                                        >설명 추가</span
                                    >
                                </button>
                            </div>
                        </div>

                        <!-- 메타 정보 영역: 위치, 태그 추가, 카테고리 선택처럼 본문 바깥의 부가 입력을 정리한다. -->
                        <div class="composerMeta" id="composerMeta">
                            <div class="composerMetaRow" id="composerMetaRow">
                                <div class="replyAudience" id="replyAudience">
                                    <button
                                        type="button"
                                        class="composerTagLabel"
                                        id="composerTagToggle"
                                        aria-expanded="false"
                                        aria-controls="composerTagEditor"
                                    >
                                        태그 추가
                                    </button>
                                    <div
                                        class="composerTagEditor"
                                        id="composerTagEditor"
                                        hidden=""
                                    >
                                        <input
                                            type="text"
                                            id="devTags"
                                            class="composerTagField"
                                            aria-label="태그 입력"
                                            placeholder="태그 입력"
                                        />
                                    </div>
                                </div>
                                <button
                                    type="button"
                                    class="tweet-modal__location-display"
                                    id="composerLocation"
                                    aria-label="위치 태그하기"
                                    hidden=""
                                >
                                    <div
                                        dir="ltr"
                                        class="tweet-modal__location-display-inner"
                                    >
                                        <svg
                                            viewBox="0 0 24 24"
                                            width="16"
                                            height="16"
                                            aria-hidden="true"
                                            class="tweet-modal__location-display-icon"
                                        >
                                            <g>
                                                <path
                                                    d="M12 2c-4.687 0-8.5 3.813-8.5 8.5 0 5.967 7.621 11.116 7.945 11.332l.555.37.555-.37c.324-.216 7.945-5.365 7.945-11.332C20.5 5.813 16.687 2 12 2zm0 11.5c-1.65 0-3-1.34-3-3s1.35-3 3-3c1.66 0 3 1.34 3 3s-1.34 3-3 3z"
                                                ></path>
                                            </g>
                                        </svg>
                                        <div
                                            class="tweet-modal__location-display-text-wrap"
                                        >
                                            <span
                                                class="tweet-modal__location-display-text-outer"
                                            >
                                                <span
                                                    class="tweet-modal__location-display-text-inner"
                                                    id="composerLocationName"
                                                ></span>
                                            </span>
                                        </div>
                                    </div>
                                </button>
                            </div>
                            <input
                                type="hidden"
                                id="postTagsValue"
                                name="tags"
                                value=""
                            />

                            <div class="category-banner composerCategoryBanner">
                                <div class="category-scroll-wrap">
                                    <button
                                        class="category-scroll-arrow category-scroll-left"
                                        id="scrollLeft"
                                        style="display: none"
                                        type="button"
                                    >
                                        <svg
                                            viewBox="0 0 24 24"
                                            width="20"
                                            height="20"
                                        >
                                            <path
                                                d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                                                fill="currentColor"
                                            ></path>
                                        </svg>
                                    </button>
                                    <div
                                        class="category-scroll"
                                        id="categoryScroll"
                                    >
                                        <button
                                            class="cat-chip active"
                                            data-cat="전체"
                                            type="button"
                                        >
                                            전체
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="수출"
                                            data-subs="미주,유럽,동남아,중국,일본,중동"
                                            type="button"
                                        >
                                            수출 ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="수입"
                                            data-subs="원자재,완제품,식품,전자부품"
                                            type="button"
                                        >
                                            수입 ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="물류"
                                            data-subs="해운,항공,육상,창고"
                                            type="button"
                                        >
                                            물류 ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="관세"
                                            data-subs="FTA,HS코드,통관,환급"
                                            type="button"
                                        >
                                            관세 ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="금융"
                                            data-subs="무역금융,환율,보험,LC"
                                            type="button"
                                        >
                                            금융 ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="IT"
                                            data-subs="플랫폼,자동화,블록체인"
                                            type="button"
                                        >
                                            IT ›
                                        </button>
                                        <button
                                            class="cat-chip has-subs"
                                            data-cat="식품"
                                            data-subs="농산물,수산물,가공식품,건강식품"
                                            type="button"
                                        >
                                            식품 ›
                                        </button>
                                        <button
                                            class="cat-chip"
                                            data-cat="화장품"
                                            type="button"
                                        >
                                            화장품
                                        </button>
                                        <button
                                            class="cat-chip"
                                            data-cat="자동차"
                                            type="button"
                                        >
                                            자동차
                                        </button>
                                        <button
                                            class="cat-chip"
                                            data-cat="섬유/의류"
                                            type="button"
                                        >
                                            섬유/의류
                                        </button>
                                        <button
                                            class="cat-chip"
                                            data-cat="기계/장비"
                                            type="button"
                                        >
                                            기계/장비
                                        </button>
                                        <button
                                            class="cat-chip"
                                            data-cat="에너지"
                                            type="button"
                                        >
                                            에너지
                                        </button>
                                    </div>
                                    <button
                                        class="category-scroll-arrow category-scroll-right"
                                        id="scrollRight"
                                        style="display: flex"
                                        type="button"
                                    >
                                        <svg
                                            viewBox="0 0 24 24"
                                            width="20"
                                            height="20"
                                        >
                                            <path
                                                d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"
                                                fill="currentColor"
                                            ></path>
                                        </svg>
                                    </button>
                                </div>
                                <div
                                    class="tweet-modal__emoji-picker"
                                    id="composerEmojiPicker"
                                    role="dialog"
                                    aria-label="이모티콘 선택기"
                                    hidden=""
                                >
                                    <div class="tweet-modal__emoji-search">
                                        <svg
                                            viewBox="0 0 24 24"
                                            width="22"
                                            height="22"
                                            aria-hidden="true"
                                            class="tweet-modal__emoji-search-icon"
                                        >
                                            <g>
                                                <path
                                                    d="M10.5 3.75c-3.728 0-6.75 3.022-6.75 6.75s3.022 6.75 6.75 6.75c1.55 0 2.977-.522 4.114-1.4l4.893 4.893 1.06-1.06-4.892-4.893a6.714 6.714 0 001.4-4.114c0-3.728-3.022-6.75-6.75-6.75zm-5.25 6.75c0-2.9 2.35-5.25 5.25-5.25s5.25 2.35 5.25 5.25-2.35 5.25-5.25 5.25-5.25-2.35-5.25-5.25z"
                                                ></path>
                                            </g>
                                        </svg>
                                        <input
                                            type="search"
                                            class="tweet-modal__emoji-search-input"
                                            data-testid="emojiSearchInput"
                                            placeholder="이모티콘 검색하기"
                                            aria-label="이모티콘 검색하기"
                                        />
                                    </div>
                                    <div
                                        class="tweet-modal__emoji-tabs"
                                        role="tablist"
